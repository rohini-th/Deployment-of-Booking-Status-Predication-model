<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Booking Approval Status Prediction</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
<div class="login">
    <h1>Booking Approval Status Prediction Model</h1>

    <form action="/predict" method="post">

        <label for="no_of_adults">Number of Adults:</label>
        <input type="number" id="no_of_adults" name="no_of_adults" min="1" step="1" required>

        <label for="no_of_children">Number of Children:</label>
        <input type="number" id="no_of_children" name="no_of_children" min="0" step="1" required>

        <label for="no_of_weekend_nights">Number of Weekend Nights:</label>
        <input type="number" id="no_of_weekend_nights" name="no_of_weekend_nights" min="0" step="1" required>

        <label for="no_of_week_nights">Number of Week Nights:</label>
        <input type="number" id="no_of_week_nights" name="no_of_week_nights" min="0" step="1" required>

        <label for="type_of_meal_plan">Type of Meal Plan:</label>
        <input type="number" id="type_of_meal_plan" name="type_of_meal_plan" min="0" step="1" required>

        <label for="required_car_parking_space">Required Car Parking Space:</label>
        <input type="number" id="required_car_parking_space" name="required_car_parking_space" min="0" step="1" required>

        <label for="room_type_reserved">Room Type Reserved:</label>
        <input type="number" id="room_type_reserved" name="room_type_reserved" min="0" step="1" required>

        <label for="lead_time">Lead Time:</label>
        <input type="number" id="lead_time" name="lead_time" min="0" step="1" required>

        <label for="arrival_year">Arrival Year:</label>
        <input type="number" id="arrival_year" name="arrival_year" min="0" step="1" required>

        <label for="arrival_month">Arrival Month:</label>
        <input type="number" id="arrival_month" name="arrival_month" min="1" max="12" step="1" required>

        <label for="arrival_date">Arrival Date:</label>
        <input type="number" id="arrival_date" name="arrival_date" min="1" max="31" step="1" required>

        <label for="market_segment_type">Market Segment Type:</label>
        <input type="number" id="market_segment_type" name="market_segment_type" min="0" step="1" required>

        <label for="repeated_guest">Repeated Guest:</label>
        <input type="number" id="repeated_guest" name="repeated_guest" min="0" max="1" step="1" required>

        <label for="no_of_previous_cancellations">Previous Cancellations:</label>
        <input type="number" id="no_of_previous_cancellations" name="no_of_previous_cancellations" min="0" step="1" required>

        <label for="no_of_previous_bookings_not_canceled">Previous Non-Cancelled Bookings:</label>
        <input type="number" id="no_of_previous_bookings_not_canceled" name="no_of_previous_bookings_not_canceled" min="0" step="1" required>

        <label for="avg_price_per_room">Average Price Per Room:</label>
        <input type="number" id="avg_price_per_room" name="avg_price_per_room" min="0" step="0.01" required>

        <label for="no_of_special_requests">Number of Special Requests:</label>
        <input type="number" id="no_of_special_requests" name="no_of_special_requests" min="0" step="1" required>

        <br><br>

        <button type="submit" class="btn btn-primary btn-block btn-large">
            Predict
        </button>

    </form>

    <br>

    {% if prediction_text %}
        <h3>{{ prediction_text }}</h3>
    {% endif %}

</div>
</body>
</html>
